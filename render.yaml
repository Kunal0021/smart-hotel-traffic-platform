services:
  - type: web
    name: smart-hotel-backend
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    rootDirectory: backend
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
        placeholder: "Your MongoDB Connection String (e.g. MongoDB Atlas)"
      - key: JWT_SECRET
        generateValue: true
